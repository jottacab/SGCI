<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gerenciar Equipamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
        .header { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; padding: 40px 0; position: relative; }
        .back-btn { position: absolute; top: 20px; left: 20px; color: white; text-decoration: none; font-size: 1.1rem; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .table thead { background-color: #34495e; color: white; }
    </style>
</head>
<body>

    <div class="header text-center">
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar ao Início</a>
        <div class="container">
            <i class="fas fa-cogs fa-3x mb-3"></i>
            <h1>Gerenciamento de Equipamentos</h1>
            <p class="lead">Controle e status da frota de ativos</p>
        </div>
    </div>

    <div class="container mt-4">
        <div class="d-flex justify-content-end mb-4">
            <a href="/equipamentos/novo" class="btn btn-primary btn-lg shadow-sm">
                <i class="fas fa-plus me-2"></i> Novo Equipamento
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">Nome</th>
                            <th>Placa / Série</th>
                            <th>Última Revisão</th>
                            <th>Status</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="equip : ${equipamentos}">
                            <td class="ps-4 fw-bold" th:text="${equip.nome}"></td>
                            <td th:text="${equip.placa ?: 'N/A'}"></td>
                            <td th:text="${equip.dataUltimaRevisao != null ? #temporals.format(equip.dataUltimaRevisao, 'dd/MM/yyyy') : 'Não realizada'}"></td>
                            <td>
                                <span th:if="${equip.status == 'APTO'}" class="badge bg-success">APTO</span>
                                <span th:if="${equip.status == 'INAPTO'}" class="badge bg-danger">INAPTO</span>
                                <span th:if="${equip.status == 'MANUTENCAO'}" class="badge bg-warning text-dark">EM MANUTENÇÃO</span>
                            </td>
                            <td class="text-center">
                                <div class="dropdown">
                                    <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                        Alterar Status
                                    </button>
                                    <ul class="dropdown-menu">
                                        <li><a class="dropdown-item" th:href="@{/equipamentos/{id}/status(id=${equip.id}, status='APTO')}">Apto</a></li>
                                        <li><a class="dropdown-item" th:href="@{/equipamentos/{id}/status(id=${equip.id}, status='INAPTO')}">Inapto</a></li>
                                        <li><a class="dropdown-item" th:href="@{/equipamentos/{id}/status(id=${equip.id}, status='MANUTENCAO')}">Manutenção</a></li>
                                    </ul>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
