<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inspeções Realizadas - Checklist Diário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 35px 0;
            position: relative;
        }
        .nav-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .btn-home {
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 50px;
            transition: all 0.3s;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="header text-center">
        <!-- BOTÃO HOME -->
        <div class="nav-buttons">
            <a href="/" class="btn btn-light btn-home shadow-sm">
                <i class="fas fa-home"></i> Início
            </a>
        </div>

        <div class="container">
            <i class="fas fa-clipboard-list fa-3x mb-3"></i>
            <h1>Inspeções Realizadas</h1>
            <p class="lead">Registros de checklist diário dos equipamentos</p>
        </div>
    </div>

    <div class="container mt-4">
        
        <div th:if="${mensagem}" th:classappend="${alertClass}" class="alert text-center alert-dismissible fade show shadow-sm mb-4" role="alert">
            <h4 class="alert-heading" th:text="${mensagem}"></h4>
            <a href="/inspecoes" class="btn btn-dark btn-sm mt-2">OK</a>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4>Lista de Inspeções</h4>
            <a href="/inspecoes/nova" class="btn btn-success">
                <i class="fas fa-plus"></i> Nova Inspeção
            </a>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Data</th>
                            <th>Equipamento</th>
                            <th>Status</th>
                            <th>Observações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="inspecao : ${inspecoes}">
                            <td th:text="${inspecao.data != null ? #temporals.format(inspecao.data, 'dd/MM/yyyy HH:mm:ss') : 'N/A'}"></td>
                            <td th:text="${inspecao.equipamento?.nome ?: 'Equipamento Indisponível'}"></td>
                            <td>
                                <span th:if="${inspecao.aprovado}" class="badge bg-success">✅ APROVADO</span>
                                <span th:if="${!inspecao.aprovado}" class="badge bg-danger">❌ REPROVADO</span>
                            </td>
                            <td th:text="${inspecao.observacoes ?: 'Sem observações'}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div th:if="${inspecoes.isEmpty()}" class="alert alert-info mt-4 text-center">
            Nenhuma inspeção registrada ainda.
        </div>
    </div>
</body>
</html>
